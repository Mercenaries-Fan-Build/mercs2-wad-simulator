[package]
name = "wad_simulator"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "wad_simulator"
path = "src/main.rs"

[dependencies]
mercs2_formats = { path = "../mercs2_formats" }
flate2 = "1"
clap = { version = "4", features = ["derive"] }
colored = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rayon = "1"
