[package]
name = "wad_simulator"
version = "1.0.0"
edition = "2021"
description = "Engine-accurate WAD consumption simulator for Mercenaries 2"
license = "MIT"
repository = "https://github.com/aussieurban/mercenaries-game"
keywords = ["wad", "mercenaries", "simulation", "engine"]
categories = ["development-tools", "command-line-utilities"]

[[bin]]
name = "wad_simulator"
path = "src/main.rs"

[dependencies]
mercs2_formats = { path = "../mercs2_formats" }
mercs2_audio = { path = "../mercs2_audio" }
ucfx_byteswap = { path = "../ucfx_byteswap" }
flate2 = "1.1.9"
clap = { version = "4.6.1", features = ["derive"] }
colored = "2.2.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
rayon = "1.12.0"
