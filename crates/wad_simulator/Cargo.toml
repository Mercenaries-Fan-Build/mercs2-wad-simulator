[package]
name = "wad_simulator"
version = "2.0.0"
edition = "2021"
description = "Engine-accurate WAD consumption simulator for Mercenaries 2"
license.workspace = true
repository.workspace = true
keywords = ["wad", "mercenaries", "simulation", "engine"]
categories = ["development-tools", "command-line-utilities"]

[[bin]]
name = "wad_simulator"
path = "src/main.rs"

[dependencies]
mercs2_formats = { workspace = true }
# Decode side only (sounddb + wave, for vo_extract / cue_probe / wavebank_layout_probe). These CLIs
# never open an output device, and linking cpal -> alsa-sys breaks the 32-bit cross-build outright
# ("pkg-config has not been configured to support cross-compilation") and would give the shipped CLI
# a runtime ALSA dependency it never calls. The engine keeps the default `device` feature.
mercs2_audio = { path = "../mercs2_audio", version = "1.0.0", default-features = false }
ucfx_byteswap = { workspace = true }
flate2 = "1.1.9"
clap = { version = "4.6.1", features = ["derive"] }
colored = "2.2.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
rayon = "1.12.0"
