[package]
name = "securom_unwrap"
version = "0.1.0"
publish = false                # excluded from the crates.io release set
edition = "2021"

[lib]
name = "securom_unwrap"
path = "src/lib.rs"

[[bin]]
name = "securom_unwrap"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
