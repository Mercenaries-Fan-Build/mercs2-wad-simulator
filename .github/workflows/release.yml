name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux pinned to ubuntu-22.04 (glibc 2.35) to match the modkit's build
          # floor — the modkit downloads and runs these binaries, so a newer image
          # would raise the glibc requirement above what the modkit supports.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            suffix: "-linux-x86_64"
            build: "--workspace"
            bins: "wad_simulator ucfx_byteswap loadprobe dlc_port mercs2_reassemble mercs2_probe mercs2_game mercs2_workshop"
          # 32-bit targets build the engine-free CLI tools only. mercs2_engine — and
          # everything that depends on it (mercs2_game/probe/workshop) — is 64-bit by
          # design, and its gilrs/cpal deps link C system libs (libudev, alsa) that
          # would need a full i386 multiarch sysroot to cross-build.
          - os: ubuntu-22.04
            target: i686-unknown-linux-gnu
            suffix: "-linux-i686"
            build: "-p wad_simulator -p ucfx_byteswap -p loadprobe -p dlc_port -p mercs2_reassemble"
            bins: "wad_simulator ucfx_byteswap loadprobe dlc_port mercs2_reassemble"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: "-windows-x86_64.exe"
            build: "--workspace"
            bins: "wad_simulator ucfx_byteswap loadprobe dlc_port mercs2_reassemble mercs2_probe mercs2_game mercs2_workshop"
          - os: windows-latest
            target: i686-pc-windows-msvc
            suffix: "-windows-i686.exe"
            build: "-p wad_simulator -p ucfx_byteswap -p loadprobe -p dlc_port -p mercs2_reassemble"
            bins: "wad_simulator ucfx_byteswap loadprobe dlc_port mercs2_reassemble"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install 32-bit Linux toolchain
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib

      # mercs2_engine links two C system libraries on Linux: gilrs -> libudev-sys
      # (gamepad hotplug via evdev) and cpal -> alsa-sys (audio output).
      - name: Install engine system libraries
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev libasound2-dev

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.build }}

      - name: Prepare artifacts
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            for b in ${{ matrix.bins }}; do cp "$b.exe" "$b${{ matrix.suffix }}"; done
          else
            for b in ${{ matrix.bins }}; do cp "$b" "$b${{ matrix.suffix }}"; done
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/*${{ matrix.suffix }}
