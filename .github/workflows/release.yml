name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          # Linux pinned to ubuntu-22.04 (glibc 2.35) to match the modkit's build
          # floor — the modkit downloads and runs these binaries, so a newer image
          # would raise the glibc requirement above what the modkit supports.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            suffix: "-linux-x86_64"
          - os: ubuntu-22.04
            target: i686-unknown-linux-gnu
            suffix: "-linux-i686"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: "-windows-x86_64.exe"
          - os: windows-latest
            target: i686-pc-windows-msvc
            suffix: "-windows-i686.exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install 32-bit Linux toolchain
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib

      - name: Build all binaries
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Prepare artifacts
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp wad_simulator.exe wad_simulator${{ matrix.suffix }}
            cp ucfx_byteswap.exe ucfx_byteswap${{ matrix.suffix }}
            cp loadprobe.exe loadprobe${{ matrix.suffix }}
            cp dlc_port.exe dlc_port${{ matrix.suffix }}
          else
            cp wad_simulator wad_simulator${{ matrix.suffix }}
            cp ucfx_byteswap ucfx_byteswap${{ matrix.suffix }}
            cp loadprobe loadprobe${{ matrix.suffix }}
            cp dlc_port dlc_port${{ matrix.suffix }}
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/*${{ matrix.suffix }}
